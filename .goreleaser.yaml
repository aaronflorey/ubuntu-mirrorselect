# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: mirrorselect

builds:
  - id: mirrorselect
    main: .
    binary: mirrorselect
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/haukened/mirrorselect/internal/app.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

homebrew_casks:
  - name: mirrorselect
    ids:
      - default
    binaries:
      - mirrorselect
    repository:
      owner: aaronflorey
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/aaronflorey/ubuntu-mirrorselect
    description: Select the fastest Ubuntu archive mirror by latency and download speed.
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    directory: Casks

changelog:
  disable: true
